<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cloudinary URLs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-item {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .test-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border: 2px solid #ddd;
            margin: 10px 0;
        }
        .success {
            border-color: #28a745;
        }
        .error {
            border-color: #dc3545;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 12px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🧪 Cloudinary URL Test</h1>
    <p>Testing the actual Cloudinary URLs returned by the API...</p>
    
    <div id="results"></div>

    <script>
        async function testCloudinaryUrls() {
            const resultsDiv = document.getElementById('results');
            
            try {
                // Get products from API
                const response = await fetch('https://generic-wholesale-backend.onrender.com/api/products/public?isAmazonsChoice=true&limit=10');
                const data = await response.json();
                
                if (data.products && data.products.length > 0) {
                    console.log('Found', data.products.length, 'products');
                    
                    data.products.forEach((product, index) => {
                        const imageUrl = product.images && product.images[0] ? product.images[0] : null;
                        
                        if (imageUrl) {
                            testImage(product, imageUrl, index, resultsDiv);
                        } else {
                            createErrorItem(product, 'No image URL found', index, resultsDiv);
                        }
                    });
                } else {
                    resultsDiv.innerHTML = '<div class="test-item"><h3>❌ No products found</h3></div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="test-item"><h3>❌ API Error: ${error.message}</h3></div>`;
            }
        }
        
        function testImage(product, imageUrl, index, container) {
            const testDiv = document.createElement('div');
            testDiv.className = 'test-item';
            testDiv.innerHTML = `
                <h3>${index + 1}. ${product.name.substring(0, 60)}...</h3>
                <p><strong>ASIN:</strong> ${product.asin || 'N/A'}</p>
                <p><strong>Price:</strong> ${product.price || 'N/A'}</p>
                <div class="status">Testing image...</div>
                <img class="test-image" alt="Testing...">
                <div style="font-size: 10px; word-break: break-all; margin-top: 10px;">
                    <strong>URL:</strong> ${imageUrl}
                </div>
            `;
            
            container.appendChild(testDiv);
            
            const img = testDiv.querySelector('.test-image');
            const status = testDiv.querySelector('.status');
            
            const startTime = performance.now();
            
            img.onload = () => {
                const loadTime = performance.now() - startTime;
                status.className = 'status success';
                status.textContent = `✅ Image loaded successfully in ${loadTime.toFixed(0)}ms`;
                img.className = 'test-image success';
                testDiv.style.borderColor = '#28a745';
            };
            
            img.onerror = () => {
                status.className = 'status error';
                status.textContent = '❌ Image failed to load';
                img.className = 'test-image error';
                testDiv.style.borderColor = '#dc3545';
                
                // Try direct Cloudinary URL without transformations
                const directUrl = imageUrl.replace(/\/upload\/[^/]+\//, '/upload/');
                console.log('Trying direct URL:', directUrl);
                
                img.src = directUrl;
                img.onload = () => {
                    status.className = 'status success';
                    status.textContent = '✅ Direct URL worked';
                    img.className = 'test-image success';
                    testDiv.style.borderColor = '#28a745';
                };
                
                img.onerror = () => {
                    status.textContent = '❌ Both URLs failed';
                };
            };
            
            img.src = imageUrl;
        }
        
        function createErrorItem(product, error, index, container) {
            const testDiv = document.createElement('div');
            testDiv.className = 'test-item';
            testDiv.style.borderColor = '#dc3545';
            testDiv.innerHTML = `
                <h3>${index + 1}. ${product.name.substring(0, 60)}...</h3>
                <p><strong>ASIN:</strong> ${product.asin || 'N/A'}</p>
                <div class="status error">❌ ${error}</div>
            `;
            container.appendChild(testDiv);
        }
        
        // Start test when page loads
        window.onload = testCloudinaryUrls;
    </script>
</body>
</html>
