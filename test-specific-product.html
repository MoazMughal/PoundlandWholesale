<!DOCTYPE html>
<html>
<head>
    <title>Test Specific Product</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Test Specific Product Fetch</h1>
    <button onclick="testProductFetch()">Test Product Fetch</button>
    <div id="results"></div>

    <script>
        async function testProductFetch() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">Testing...</div>';
            
            try {
                // First get list of products
                console.log('Step 1: Getting product list...');
                const listResponse = await fetch('https://generic-wholesale-backend.onrender.com/api/products/public?limit=5');
                
                if (!listResponse.ok) {
                    throw new Error(`List fetch failed: ${listResponse.status}`);
                }
                
                const listData = await listResponse.json();
                console.log('Products list:', listData);
                
                if (!listData.products || listData.products.length === 0) {
                    resultsDiv.innerHTML = '<div class="result error">No products found in list</div>';
                    return;
                }
                
                const firstProduct = listData.products[0];
                console.log('First product:', firstProduct);
                
                // Now test fetching this specific product
                console.log('Step 2: Fetching specific product...');
                const productResponse = await fetch(`https://generic-wholesale-backend.onrender.com/api/products/public/${firstProduct._id}`);
                
                let result = `
                    <div class="result success">
                        <h3>✅ Product List Success</h3>
                        <p><strong>Total Products:</strong> ${listData.products.length}</p>
                        <p><strong>First Product ID:</strong> ${firstProduct._id}</p>
                        <p><strong>First Product Name:</strong> ${firstProduct.name}</p>
                    </div>
                `;
                
                if (productResponse.ok) {
                    const productData = await productResponse.json();
                    console.log('Single product data:', productData);
                    
                    result += `
                        <div class="result success">
                            <h3>✅ Single Product Fetch Success</h3>
                            <p><strong>Product ID:</strong> ${productData._id}</p>
                            <p><strong>Product Name:</strong> ${productData.name}</p>
                            <p><strong>Price:</strong> £${productData.price}</p>
                            <details>
                                <summary>Full Product Data</summary>
                                <pre>${JSON.stringify(productData, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    const errorText = await productResponse.text();
                    result += `
                        <div class="result error">
                            <h3>❌ Single Product Fetch Failed</h3>
                            <p><strong>Status:</strong> ${productResponse.status}</p>
                            <p><strong>Error:</strong> ${errorText}</p>
                        </div>
                    `;
                }
                
                // Test the exact same flow as ProductDetail component
                console.log('Step 3: Testing ProductDetail flow...');
                const productDetailFlow = await fetch('https://generic-wholesale-backend.onrender.com/api/products/public?limit=5000');
                
                if (productDetailFlow.ok) {
                    const allProductsData = await productDetailFlow.json();
                    const foundProduct = allProductsData.products.find(p => p._id === firstProduct._id);
                    
                    if (foundProduct) {
                        result += `
                            <div class="result success">
                                <h3>✅ ProductDetail Flow Success</h3>
                                <p><strong>Found in large list:</strong> YES</p>
                                <p><strong>Product Name:</strong> ${foundProduct.name}</p>
                            </div>
                        `;
                    } else {
                        result += `
                            <div class="result error">
                                <h3>❌ ProductDetail Flow Failed</h3>
                                <p><strong>Found in large list:</strong> NO</p>
                                <p><strong>Total products in large list:</strong> ${allProductsData.products.length}</p>
                            </div>
                        `;
                    }
                } else {
                    result += `
                        <div class="result error">
                            <h3>❌ Large List Fetch Failed</h3>
                            <p><strong>Status:</strong> ${productDetailFlow.status}</p>
                        </div>
                    `;
                }
                
                resultsDiv.innerHTML = result;
                
            } catch (error) {
                console.error('Test error:', error);
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Test Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Auto-run test
        window.onload = () => {
            setTimeout(testProductFetch, 1000);
        };
    </script>
</body>
</html>
