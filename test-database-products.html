<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Products Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 300px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Database Products Test</h1>
    <p>This page tests the database connection and product availability.</p>
    
    <button onclick="testDatabaseHealth()">Test Database Health</button>
    <button onclick="testProductCount()">Test Product Count</button>
    <button onclick="testAmazonsChoiceCount()">Test Amazon's Choice Count</button>
    <button onclick="testSampleProducts()">Get Sample Products</button>
    <button onclick="runAllTests()">Run All Tests</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'https://generic-wholesale-backend.onrender.com/api';
        
        function addResult(title, success, message, data = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            
            let content = `<h3>${title}</h3><p>${message}</p>`;
            if (data) {
                content += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            div.innerHTML = content;
            results.appendChild(div);
        }
        
        function addInfo(message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'test-result info';
            div.innerHTML = `<p>${message}</p>`;
            results.appendChild(div);
        }
        
        async function testDatabaseHealth() {
            addInfo('Testing database health...');
            try {
                const response = await fetch(`${API_BASE}/test-db`);
                const data = await response.json();
                
                if (response.ok && data.success) {
                    addResult('Database Health', true, 'Database is healthy and connected', {
                        tests: data.tests,
                        totalTime: data.totalTime
                    });
                } else {
                    addResult('Database Health', false, 'Database connection issues', data);
                }
            } catch (error) {
                addResult('Database Health', false, `Failed to test database: ${error.message}`);
            }
        }
        
        async function testProductCount() {
            addInfo('Testing product count...');
            try {
                const response = await fetch(`${API_BASE}/products/public/debug/amazons-choice-count`);
                const data = await response.json();
                
                if (response.ok) {
                    const hasProducts = data.totalProducts > 0;
                    const hasAmazonsChoice = data.amazonsChoiceProducts > 0;
                    
                    addResult('Product Count', hasProducts, 
                        `Total Products: ${data.totalProducts}, Amazon's Choice: ${data.amazonsChoiceProducts}`, 
                        {
                            totalProducts: data.totalProducts,
                            amazonsChoiceProducts: data.amazonsChoiceProducts,
                            percentage: data.percentage,
                            categoryCounts: data.categoryCounts
                        }
                    );
                } else {
                    addResult('Product Count', false, 'Failed to get product count', data);
                }
            } catch (error) {
                addResult('Product Count', false, `Failed to get product count: ${error.message}`);
            }
        }
        
        async function testAmazonsChoiceCount() {
            addInfo('Testing Amazon\'s Choice products...');
            try {
                const response = await fetch(`${API_BASE}/products/public?isAmazonsChoice=true&limit=1`);
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const hasProducts = data.products && data.products.length > 0;
                    addResult('Amazon\'s Choice Products', hasProducts, 
                        `Found ${data.total} Amazon's Choice products`, 
                        {
                            total: data.total,
                            source: data.source,
                            sampleProduct: data.products[0] || null
                        }
                    );
                } else {
                    addResult('Amazon\'s Choice Products', false, 'Failed to fetch Amazon\'s Choice products', data);
                }
            } catch (error) {
                addResult('Amazon\'s Choice Products', false, `Failed to fetch Amazon's Choice products: ${error.message}`);
            }
        }
        
        async function testSampleProducts() {
            addInfo('Getting sample products...');
            try {
                const response = await fetch(`${API_BASE}/products/public?limit=3`);
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const hasProducts = data.products && data.products.length > 0;
                    addResult('Sample Products', hasProducts, 
                        `Retrieved ${data.products.length} sample products`, 
                        {
                            total: data.total,
                            source: data.source,
                            products: data.products.map(p => ({
                                id: p._id,
                                name: p.name,
                                price: p.price,
                                category: p.category,
                                isAmazonsChoice: p.isAmazonsChoice,
                                images: p.images?.length || 0
                            }))
                        }
                    );
                } else {
                    addResult('Sample Products', false, 'Failed to fetch sample products', data);
                }
            } catch (error) {
                addResult('Sample Products', false, `Failed to fetch sample products: ${error.message}`);
            }
        }
        
        async function runAllTests() {
            document.getElementById('results').innerHTML = '';
            addInfo(`Testing database connection to: ${API_BASE}`);
            
            await testDatabaseHealth();
            await testProductCount();
            await testAmazonsChoiceCount();
            await testSampleProducts();
            
            addInfo('All tests completed!');
        }
        
        // Auto-run tests when page loads
        window.onload = () => {
            runAllTests();
        };
    </script>
</body>
</html>
