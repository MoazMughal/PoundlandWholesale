<!DOCTYPE html>
<html>
<head>
    <title>Cloudinary Configuration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .config-item { margin: 5px 0; padding: 5px; background: #f8f9fa; border-radius: 3px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Cloudinary Configuration Test</h1>
    <p>This tool helps diagnose Cloudinary configuration issues in production.</p>
    
    <button onclick="testCloudinaryConfig()">Test Cloudinary Configuration</button>
    
    <div id="result"></div>
    
    <script>
        // Use production URL by default, but allow override
        const BASE_URL = 'https://generic-wholesale-backend.onrender.com/api';
        
        async function testCloudinaryConfig() {
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '<div class="result info">🔄 Testing Cloudinary configuration...</div>';
                
                // Get admin token (you'll need to login first)
                const token = localStorage.getItem('adminToken') || prompt('Enter admin token (login to admin panel first):');
                
                if (!token) {
                    resultDiv.innerHTML = '<div class="result error">❌ Admin token required. Please login to admin panel first.</div>';
                    return;
                }
                
                const response = await fetch(`${BASE_URL}/admin-excel/debug/cloudinary-config`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const config = data.config;
                    let html = '<div class="result ' + (config.isConfigured ? 'success' : 'error') + '">';
                    html += '<h3>' + (config.isConfigured ? '✅ Cloudinary is configured!' : '❌ Cloudinary is NOT configured') + '</h3>';
                    html += '<div class="config-item"><strong>Environment:</strong> ' + config.environment + '</div>';
                    html += '<div class="config-item"><strong>Cloud Name:</strong> ' + config.cloudName + '</div>';
                    html += '<div class="config-item"><strong>API Key:</strong> ' + config.apiKey + '</div>';
                    html += '<div class="config-item"><strong>API Secret:</strong> ' + config.apiSecret + '</div>';
                    html += '<div class="config-item"><strong>Instructions:</strong> ' + config.instructions + '</div>';
                    html += '</div>';
                    
                    if (!config.isConfigured) {
                        html += '<div class="result info">';
                        html += '<h4>🔧 How to Fix:</h4>';
                        html += '<ol>';
                        html += '<li>Go to <a href="https://dashboard.render.com" target="_blank">Render Dashboard</a></li>';
                        html += '<li>Select your backend service (generic-wholesale-backend)</li>';
                        html += '<li>Go to Environment tab</li>';
                        html += '<li>Add these environment variables:</li>';
                        html += '<ul>';
                        html += '<li><code>CLOUDINARY_CLOUD_NAME=dtuq3tvjx</code></li>';
                        html += '<li><code>CLOUDINARY_API_KEY=157123271226775</code></li>';
                        html += '<li><code>CLOUDINARY_API_SECRET=6NH5-ZlFcQnq4cMV6tua10b-1G0</code></li>';
                        html += '</ul>';
                        html += '<li>Save and redeploy the service</li>';
                        html += '</ol>';
                        html += '</div>';
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="result error">❌ Error: ' + data.message + '</div>';
                }
                
            } catch (error) {
                console.error('Test error:', error);
                resultDiv.innerHTML = '<div class="result error">❌ Network error: ' + error.message + '</div>';
            }
        }
        
        // Auto-test on page load if we have a token
        window.onload = function() {
            if (localStorage.getItem('adminToken')) {
                testCloudinaryConfig();
            }
        };
    </script>
</body>
</html>
