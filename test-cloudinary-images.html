<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary Image Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .test-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            border-color: #4caf50;
        }
        .error {
            border-color: #f44336;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 12px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🖼️ Cloudinary Image Test</h1>
    <p>Testing the actual Cloudinary images found in the database...</p>
    
    <div id="test-results" class="test-grid"></div>

    <script>
        const testUrls = [
            {
                name: 'Watch Strap (B0001K9WB2)',
                url: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/w_400,h_400,c_fill,f_auto,q_auto/products/B0001K9WB2',
                originalUrl: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/products/B0001K9WB2'
            },
            {
                name: 'Default Product',
                url: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/w_400,h_400,c_fill,f_auto,q_auto/products/default-product',
                originalUrl: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/products/default-product'
            },
            {
                name: 'Test with different ASIN (B08N5WRWNW)',
                url: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/w_400,h_400,c_fill,f_auto,q_auto/products/B08N5WRWNW',
                originalUrl: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/products/B08N5WRWNW'
            },
            {
                name: 'Raw Cloudinary URL (no transformations)',
                url: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/products/B0001K9WB2.jpg',
                originalUrl: 'https://res.cloudinary.com/dtuq3tvjx/image/upload/products/B0001K9WB2.jpg'
            }
        ];

        function testImage(testItem) {
            const resultsDiv = document.getElementById('test-results');
            
            const testDiv = document.createElement('div');
            testDiv.className = 'test-item';
            testDiv.innerHTML = `
                <h3>${testItem.name}</h3>
                <div class="status">Testing...</div>
                <img class="test-image" alt="Testing...">
                <div style="font-size: 10px; word-break: break-all; margin-top: 10px;">
                    <strong>URL:</strong> ${testItem.url}
                </div>
            `;
            
            resultsDiv.appendChild(testDiv);
            
            const img = testDiv.querySelector('.test-image');
            const status = testDiv.querySelector('.status');
            
            const startTime = performance.now();
            
            img.onload = () => {
                const loadTime = performance.now() - startTime;
                status.className = 'status success';
                status.textContent = `✅ Loaded in ${loadTime.toFixed(0)}ms`;
                img.className = 'test-image success';
                testDiv.className = 'test-item success';
            };
            
            img.onerror = () => {
                status.className = 'status error';
                status.textContent = '❌ Failed to load';
                img.className = 'test-image error';
                testDiv.className = 'test-item error';
                
                // Try the original URL as fallback
                if (testItem.originalUrl && testItem.originalUrl !== testItem.url) {
                    status.textContent = '❌ Failed, trying original...';
                    img.src = testItem.originalUrl;
                    
                    img.onload = () => {
                        status.className = 'status success';
                        status.textContent = '✅ Original URL worked';
                        img.className = 'test-image success';
                        testDiv.className = 'test-item success';
                    };
                    
                    img.onerror = () => {
                        status.className = 'status error';
                        status.textContent = '❌ Both URLs failed';
                    };
                }
            };
            
            img.src = testItem.url;
        }

        // Test all URLs
        testUrls.forEach(testImage);
        
        // Also test the API response
        setTimeout(async () => {
            try {
                const response = await fetch('https://generic-wholesale-backend.onrender.com/api/products/public?isAmazonsChoice=true&limit=3');
                const data = await response.json();
                
                if (data.products && data.products.length > 0) {
                    console.log('API Response Sample:', data.products[0]);
                    
                    // Test the first product's image
                    const firstProduct = data.products[0];
                    if (firstProduct.images && firstProduct.images[0]) {
                        testImage({
                            name: `API Product: ${firstProduct.name.substring(0, 30)}...`,
                            url: firstProduct.images[0],
                            originalUrl: firstProduct.images[0]
                        });
                    }
                }
            } catch (error) {
                console.error('API test failed:', error);
            }
        }, 2000);
    </script>
</body>
</html>
