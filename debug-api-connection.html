<!DOCTYPE html>
<html>
<head>
    <title>Debug API Connection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 API Connection Debug</h1>
    <button onclick="runAllTests()">Run All Tests</button>
    <div id="results"></div>

    <script>
        const API_BASE = 'https://generic-wholesale-backend.onrender.com/api';
        
        async function testEndpoint(name, url, expectedFields = []) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result';
            
            try {
                console.log(`Testing ${name}: ${url}`);
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                console.log(`${name} Response:`, response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log(`${name} Data:`, data);
                    
                    let validation = '';
                    if (expectedFields.length > 0) {
                        const missing = expectedFields.filter(field => !data.hasOwnProperty(field));
                        if (missing.length > 0) {
                            validation = `⚠️ Missing fields: ${missing.join(', ')}`;
                        } else {
                            validation = '✅ All expected fields present';
                        }
                    }
                    
                    resultDiv.className += ' success';
                    resultDiv.innerHTML = `
                        <h3>✅ ${name} - SUCCESS</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>URL:</strong> ${url}</p>
                        ${validation ? `<p><strong>Validation:</strong> ${validation}</p>` : ''}
                        <details>
                            <summary>Response Data</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    const errorText = await response.text();
                    console.error(`${name} Error:`, response.status, errorText);
                    
                    resultDiv.className += ' error';
                    resultDiv.innerHTML = `
                        <h3>❌ ${name} - ERROR</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>URL:</strong> ${url}</p>
                        <p><strong>Error:</strong> ${errorText}</p>
                    `;
                }
            } catch (error) {
                console.error(`${name} Connection Error:`, error);
                
                resultDiv.className += ' error';
                resultDiv.innerHTML = `
                    <h3>❌ ${name} - CONNECTION ERROR</h3>
                    <p><strong>URL:</strong> ${url}</p>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
            
            return resultDiv;
        }
        
        async function runAllTests() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test-result info"><h3>🔄 Running Tests...</h3></div>';
            
            const tests = [
                {
                    name: 'Health Check',
                    url: `${API_BASE}/health`,
                    fields: []
                },
                {
                    name: 'Products List (5 items)',
                    url: `${API_BASE}/products/public?limit=5`,
                    fields: ['products', 'total']
                },
                {
                    name: 'Products List (All)',
                    url: `${API_BASE}/products/public?limit=5000`,
                    fields: ['products', 'total']
                },
                {
                    name: 'Email Config Test',
                    url: `${API_BASE}/test/test-email-config`,
                    fields: []
                }
            ];
            
            resultsDiv.innerHTML = '';
            
            for (const test of tests) {
                const result = await testEndpoint(test.name, test.url, test.fields);
                resultsDiv.appendChild(result);
            }
            
            // Test specific product ID if we got products
            try {
                const productsResponse = await fetch(`${API_BASE}/products/public?limit=5`);
                if (productsResponse.ok) {
                    const productsData = await productsResponse.json();
                    if (productsData.products && productsData.products.length > 0) {
                        const firstProduct = productsData.products[0];
                        const productTest = await testEndpoint(
                            `Single Product (${firstProduct.name.substring(0, 30)}...)`,
                            `${API_BASE}/products/public/${firstProduct._id}`,
                            ['_id', 'name', 'price']
                        );
                        resultsDiv.appendChild(productTest);
                    }
                }
            } catch (error) {
                console.error('Error testing single product:', error);
            }
        }
        
        // Auto-run tests on page load
        window.onload = () => {
            setTimeout(runAllTests, 1000);
        };
    </script>
</body>
</html>
