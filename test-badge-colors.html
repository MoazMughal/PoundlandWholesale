<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge Color Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .badge-test {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.6);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .mobile-test {
            width: 200px;
            height: 150px;
            background: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            position: relative;
            margin: 20px;
        }
        .mobile-test img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }
        .mobile-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <h2>Badge Color Test</h2>
    <p>Testing all badge colors and variations:</p>
    
    <div class="badge-test">
        <div class="badge" style="background-color: #e74c3c;">
            <span>🏆</span> Best Seller
        </div>
        <div class="badge" style="background-color: #f39c12;">
            <span>⭐</span> Top Rated
        </div>
        <div class="badge" style="background-color: #e67e22;">
            <span>🔥</span> Crazy Low
        </div>
        <div class="badge" style="background-color: #9b59b6;">
            <span>💎</span> Very Popular
        </div>
        <div class="badge" style="background-color: #3498db;">
            <span>⚡</span> Limited Time
        </div>
        <div class="badge" style="background-color: #e91e63;">
            <span>💥</span> Hot Deal
        </div>
        <div class="badge" style="background-color: #1abc9c;">
            <span>📈</span> Trending
        </div>
        <div class="badge" style="background-color: #27ae60;">
            <span>✨</span> New Arrival
        </div>
    </div>

    <h3>Mobile Badge Test</h3>
    <div class="mobile-test">
        <div style="width: 100%; height: 100px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; border-radius: 8px 8px 0 0;">
            Product Image Area
        </div>
        <div class="mobile-badge">
            <div class="badge" style="background-color: #e74c3c; font-size: 9px; padding: 4px 6px;">
                <span style="font-size: 7px;">🏆</span> Best Seller
            </div>
        </div>
        <div style="padding: 10px; text-align: center; font-size: 12px;">
            Test Product
        </div>
    </div>

    <script>
        // Rotate badge colors every 2 seconds
        const badges = [
            { text: 'Best Seller', color: '#e74c3c', icon: '🏆' },
            { text: 'Top Rated', color: '#f39c12', icon: '⭐' },
            { text: 'Crazy Low', color: '#e67e22', icon: '🔥' },
            { text: 'Very Popular', color: '#9b59b6', icon: '💎' },
            { text: 'Limited Time', color: '#3498db', icon: '⚡' },
            { text: 'Hot Deal', color: '#e91e63', icon: '💥' },
            { text: 'Trending', color: '#1abc9c', icon: '📈' },
            { text: 'New Arrival', color: '#27ae60', icon: '✨' }
        ];

        let currentBadgeIndex = 0;
        const mobileBadge = document.querySelector('.mobile-badge .badge');

        function rotateBadge() {
            const badge = badges[currentBadgeIndex];
            mobileBadge.style.backgroundColor = badge.color;
            mobileBadge.innerHTML = `<span style="font-size: 7px;">${badge.icon}</span> ${badge.text}`;
            currentBadgeIndex = (currentBadgeIndex + 1) % badges.length;
        }

        // Rotate every 2 seconds
        setInterval(rotateBadge, 2000);
        
        console.log('Badge rotation started. Colors should change every 2 seconds.');
        console.log('Available colors:', badges.map(b => `${b.text}: ${b.color}`));
    </script>
</body>
</html>
