services:
  # Backend API Service
  - type: web
    name: poundlandwholesale-backend
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm ci || npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # IMPORTANT: Set these in Render Dashboard, not here!
      # Go to: Dashboard > Service > Environment > Add Environment Variable
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: PoundlandWholesale.com
      - key: FRONTEND_URL
        value: https://poundlandwholesale.com
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EASYPAISA_MERCHANT_ID
        sync: false
      - key: EASYPAISA_STORE_ID
        sync: false
      - key: EASYPAISA_SECRET_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: poundlandwholesale-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Handle API routes - proxy to backend
      - type: redirect
        source: /api/*
        destination: https://generic-wholesale-backend.onrender.com/api/:splat
        status: 200
      
      # Serve static files with correct content types
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /robots.txt
        destination: /robots.txt
      - type: rewrite
        source: /favicon-v3.png
        destination: /favicon-v3.png
      - type: rewrite
        source: /site.webmanifest
        destination: /site.webmanifest
      - type: rewrite
        source: /browserconfig.xml
        destination: /browserconfig.xml
      
      # Handle all other routes - serve index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Sitemap specific headers
      - path: /sitemap.xml
        headers:
          - key: Content-Type
            value: application/xml; charset=utf-8
          - key: Cache-Control
            value: public, max-age=3600
          - key: Access-Control-Allow-Origin
            value: "*"
      
      # Robots.txt headers
      - path: /robots.txt
        headers:
          - key: Content-Type
            value: text/plain; charset=utf-8
          - key: Cache-Control
            value: public, max-age=86400
      
      # Favicon headers
      - path: /favicon-v3.png
        headers:
          - key: Content-Type
            value: image/png
          - key: Cache-Control
            value: public, max-age=31536000, immutable
          - key: Access-Control-Allow-Origin
            value: "*"
      
      # Web manifest headers
      - path: /site.webmanifest
        headers:
          - key: Content-Type
            value: application/manifest+json
          - key: Cache-Control
            value: public, max-age=86400
      
      # Browser config headers
      - path: /browserconfig.xml
        headers:
          - key: Content-Type
            value: application/xml; charset=utf-8
          - key: Cache-Control
            value: public, max-age=86400
      
      # General security headers
      - path: /*
        headers:
          - key: X-Frame-Options
            value: DENY
          - key: X-Content-Type-Options
            value: nosniff
          - key: Referrer-Policy
            value: strict-origin-when-cross-origin
    envVars:
      - key: VITE_API_URL
        value: https://generic-wholesale-backend.onrender.com/api

